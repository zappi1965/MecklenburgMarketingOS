
events {}
http {
  server {
    listen 80;
    server_name _;
    client_max_body_size 20M;

    location /api/ {
      proxy_pass http://backend:4000/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
      proxy_pass http://frontend:3000/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
