
services:
  frontend:
    build: ../frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:4000
    depends_on:
      - backend

  backend:
    build: ../backend
    ports:
      - "4000:4000"
    env_file:
      - ../backend/.env
    depends_on:
      - redis
      - postgres
    volumes:
      - uploads:/app/uploads

  worker:
    build: ../backend
    command: npm run worker
    env_file:
      - ../backend/.env
    depends_on:
      - redis
      - backend

  redis:
    image: redis:7-alpine
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
      - redis-data:/data
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mmos
      POSTGRES_USER: mmos
      POSTGRES_PASSWORD: mmos_dev_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../supabase/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql
    ports:
      - "5432:5432"

volumes:
  redis-data:
  postgres-data:
  uploads:
