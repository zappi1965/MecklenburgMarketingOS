name: MMOS Fullbuild Check

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  fullbuild:
    name: MMOS V061 Fullbuild
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: MMOS V061 Fullbuild Guard
        run: yarn fullbuild:check

      - name: Existing Quality Guard
        run: yarn quality:guard

      - name: TypeScript Check
        run: yarn --cwd frontend typecheck

      - name: Production Build
        run: yarn --cwd frontend build

      - name: Backend Unit Tests
        run: yarn --cwd backend test

      - name: Install Playwright (chromium)
        run: yarn --cwd frontend exec playwright install --with-deps chromium

      - name: E2E Smoke (chromium, hermetic)
        run: yarn --cwd frontend e2e:ci --project=chromium ci-smoke

  security-audit:
    name: Dependency Security Audit (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Yarn Audit (informational)
        run: yarn audit --groups dependencies --level moderate || true
