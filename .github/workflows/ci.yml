name: CI

on:
  push:
    branches:
      - main
      - 'claude/**'
  pull_request:
    branches:
      - main

# Concurrency: cancel older runs of the same ref when a new push arrives.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Unit + Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Lint loadable modules (syntax + require)
        run: |
          node -e "
            const files = [
              './src/server.js',
              './src/lib/supabaseAdmin.js',
              './src/utils/redact.js',
              './src/services/sentryService.js',
              './src/services/automationEngine.js',
              './src/services/customerIntelligenceService.js',
              './src/middleware/auth.js',
              './src/middleware/requireCustomerAccess.js',
              './src/routes/gdprRoutes.js',
              './src/routes/automationRoutes.js',
              './src/routes/qrRoutes.js',
              './src/workers/gdprWorker.js',
              './src/workers/automationWorker.js'
            ];
            for (const f of files) {
              try { require(f); console.log('OK', f); }
              catch (e) {
                if (String(e.message).includes('listen EADDRINUSE')) { console.log('OK (server.listen)', f); continue; }
                console.error('FAIL', f, e.message); process.exit(1);
              }
            }
          "

      - name: Unit tests
        run: npm test

      - name: Smoke tests against running server
        run: npm run smoke:full
        env:
          SUPABASE_URL: https://invalid.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: fake-test-key
          NODE_ENV: test

  frontend:
    name: Frontend Typecheck + Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install
        run: yarn install --frozen-lockfile

      - name: Typecheck
        run: yarn typecheck

      - name: Build (Next.js)
        run: yarn build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://invalid.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: fake-anon-key
          NEXT_PUBLIC_API_BASE: http://localhost:4000
